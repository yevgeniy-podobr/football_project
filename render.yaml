databases:
  - name: football-predictor-db
    plan: free
    region: oregon

services:
  # ─── Backend (NestJS Web Service) ────────────────────────────────────────────
  - type: web
    name: football-predictor-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm db:generate &&
      pnpm --filter backend build &&
      pnpm db:push
    startCommand: pnpm --filter backend start:prod
    envVars:
      - key: NODE_ENV
        value: production
      # Render sets PORT automatically — do not hardcode
      - key: DATABASE_URL
        fromDatabase:
          name: football-predictor-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false   # set to the deployed frontend URL, e.g. https://football-predictor.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false   # defaults to onboarding@resend.dev; set once a custom domain is verified

  # ─── Frontend (React + Vite Static Site) ─────────────────────────────────────
  - type: web
    runtime: static
    name: football-predictor-frontend
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter frontend build
    staticPublishPath: ./apps/frontend/dist
    envVars:
      # Baked into the bundle at build time by Vite — must include /api suffix
      - key: VITE_API_URL
        sync: false   # e.g. https://football-predictor-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
